<svg xmlns="http://www.w3.org/2000/svg" width="620" height="260" font-family="Arial">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="620" height="260" fill="#f8f9fa" rx="12"/>
  <text x="310" y="24" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a2e">MVCC: читатели и писатели не блокируют друг друга</text>

  <!-- Левая часть: блокировочная модель -->
  <rect x="15" y="38" width="270" height="24" rx="5" fill="#e74c3c"/>
  <text x="150" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="white">❌ Блокировочная модель (не PG)</text>

  <rect x="15" y="72" width="115" height="36" rx="8" fill="#4a90d9" fill-opacity="0.8"/>
  <text x="72" y="95" text-anchor="middle" font-size="18" fill="white">Писатель 🔒</text>

  <rect x="165" y="72" width="115" height="36" rx="8" fill="#bdc3c7"/>
  <text x="222" y="86" text-anchor="middle" font-size="16" fill="#7f8c8d">Читатель</text>
  <text x="222" y="100" text-anchor="middle" font-size="15" fill="#e74c3c">⏳ ждёт...</text>

  <line x1="130" y1="90" x2="165" y2="90" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="147" y="82" text-anchor="middle" font-size="16" fill="#e74c3c">🔒</text>

  <rect x="15" y="128" width="270" height="26" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="150" y="145" text-anchor="middle" font-size="15" fill="#7f8c8d">Пока писатель не закончит — читатель ждёт</text>

  <!-- Правая часть: MVCC -->
  <rect x="335" y="38" width="270" height="24" rx="5" fill="#27ae60"/>
  <text x="470" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="white">✅ MVCC (PostgreSQL)</text>

  <!-- Версии строки -->
  <rect x="395" y="68" width="150" height="26" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="470" y="85" text-anchor="middle" font-size="15" fill="#555">Строка ratings</text>

  <rect x="365" y="104" width="100" height="30" rx="6" fill="#f5a623" fill-opacity="0.8"/>
  <text x="415" y="118" text-anchor="middle" font-size="15" fill="white">Версия v1</text>
  <text x="415" y="130" text-anchor="middle" font-size="15" fill="white">rating=4.0</text>

  <rect x="475" y="104" width="100" height="30" rx="6" fill="#4a90d9" fill-opacity="0.8"/>
  <text x="525" y="118" text-anchor="middle" font-size="15" fill="white">Версия v2</text>
  <text x="525" y="130" text-anchor="middle" font-size="15" fill="white">rating=5.0</text>

  <line x1="470" y1="94" x2="415" y2="104" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="94" x2="525" y2="104" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="335" y="155" width="120" height="26" rx="6" fill="#8e44ad" fill-opacity="0.15" stroke="#8e44ad"/>
  <text x="395" y="172" text-anchor="middle" font-size="15" fill="#6c3483">Читатель → v1 (4.0)</text>

  <rect x="465" y="155" width="140" height="26" rx="6" fill="#4a90d9" fill-opacity="0.15" stroke="#4a90d9"/>
  <text x="535" y="172" text-anchor="middle" font-size="15" fill="#2c6fad">Писатель → создаёт v2</text>

  <rect x="335" y="195" width="270" height="26" rx="5" fill="#27ae60" fill-opacity="0.1" stroke="#27ae60"/>
  <text x="470" y="212" text-anchor="middle" font-size="15" fill="#1e8449">Работают одновременно — без ожидания ✅</text>

  <!-- Разделитель -->
  <line x1="310" y1="35" x2="310" y2="240" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="5,4"/>
</svg>
