<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" font-family="Arial">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="640" height="300" fill="#f8f9fa" rx="12"/>
  <text x="320" y="24" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a2e">MVCC: что происходит при UPDATE</text>
  <text x="320" y="42" text-anchor="middle" font-size="16" fill="#555">UPDATE ratings SET rating=5.0 WHERE user_id=1 AND movie_id=1  — транзакция xid=200</text>

  <!-- ДО -->
  <text x="160" y="68" text-anchor="middle" font-size="18" font-weight="bold" fill="#27ae60">ДО UPDATE</text>
  <rect x="30" y="75" width="260" height="70" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="160" y="97" text-anchor="middle" font-size="16" fill="#1e8449">ctid = (0,1)</text>
  <text x="160" y="113" text-anchor="middle" font-size="16" fill="#1e8449">xmin = 100  |  xmax = 0</text>
  <text x="160" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e8449">rating = 4.0  ✅ видна всем</text>

  <!-- Стрелка -->
  <text x="320" y="100" text-anchor="middle" font-size="33" fill="#555">→</text>
  <text x="320" y="118" text-anchor="middle" font-size="15" fill="#555">xid=200</text>
  <text x="320" y="132" text-anchor="middle" font-size="15" fill="#555">UPDATE</text>

  <!-- ПОСЛЕ -->
  <text x="490" y="68" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c">ПОСЛЕ UPDATE</text>

  <!-- Старая версия (мёртвая) -->
  <rect x="360" y="75" width="260" height="70" rx="8" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="490" y="97" text-anchor="middle" font-size="16" fill="#c0392b">ctid = (0,1)</text>
  <text x="490" y="113" text-anchor="middle" font-size="16" fill="#c0392b">xmin = 100  |  xmax = 200</text>
  <text x="490" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0392b">rating = 4.0  💀 мёртвая</text>

  <!-- Новая версия -->
  <rect x="360" y="170" width="260" height="70" rx="8" fill="#d5e8f0" stroke="#2c6fad" stroke-width="1.5"/>
  <text x="490" y="192" text-anchor="middle" font-size="16" fill="#2c6fad">ctid = (0,8)  ← новый адрес</text>
  <text x="490" y="208" text-anchor="middle" font-size="16" fill="#2c6fad">xmin = 200  |  xmax = 0</text>
  <text x="490" y="224" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c6fad">rating = 5.0  ✅ новая версия</text>

  <!-- Связь между версиями -->
  <line x1="490" y1="145" x2="490" y2="170" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="510" y="162" text-anchor="left" font-size="15" fill="#e74c3c">ctid указывает</text>

  <!-- Шаги -->
  <rect x="30" y="180" width="260" height="70" rx="8" fill="#fff" stroke="#bdc3c7" stroke-width="1"/>
  <text x="160" y="200" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">PostgreSQL делает:</text>
  <text x="50" y="218" font-size="16" fill="#555">1. Старая строка: xmax = 200</text>
  <text x="50" y="234" font-size="16" fill="#555">2. Новая строка: xmin=200, xmax=0</text>
  <text x="50" y="250" font-size="16" fill="#e74c3c">   НЕ перезаписывает на месте!</text>

  <!-- VACUUM -->
  <rect x="30" y="265" width="580" height="24" rx="6" fill="#f5a623" fill-opacity="0.15" stroke="#f5a623"/>
  <text x="320" y="281" text-anchor="middle" font-size="16" fill="#d4861a">Мёртвые версии убирает процесс VACUUM (пылесос) — когда они больше не нужны ни одной транзакции</text>
</svg>
