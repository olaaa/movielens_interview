<svg xmlns="http://www.w3.org/2000/svg" width="580" height="280" font-family="Arial">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="580" height="280" fill="#f8f9fa" rx="12"/>
  <text x="290" y="24" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a2e">Аномалия: Грязное чтение (Dirty Read)</text>

  <!-- Колонки -->
  <rect x="20" y="38" width="155" height="28" rx="6" fill="#4a90d9"/>
  <text x="97" y="57" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Транзакция 1</text>
  <rect x="215" y="38" width="150" height="28" rx="6" fill="#34495e"/>
  <text x="290" y="57" text-anchor="middle" font-size="18" font-weight="bold" fill="white">База данных</text>
  <rect x="405" y="38" width="155" height="28" rx="6" fill="#8e44ad"/>
  <text x="482" y="57" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Транзакция 2</text>

  <!-- Линии времени -->
  <line x1="97" y1="66" x2="97" y2="265" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="66" x2="290" y2="265" stroke="#34495e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="482" y1="66" x2="482" y2="265" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Шаг 1: T1 UPDATE -->
  <rect x="20" y="78" width="155" height="30" rx="5" fill="#4a90d9" fill-opacity="0.15" stroke="#4a90d9" stroke-width="1"/>
  <text x="97" y="98" text-anchor="middle" font-size="15" fill="#2c6fad">UPDATE ratings</text>
  <line x1="175" y1="93" x2="215" y2="93" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="215" y="78" width="150" height="30" rx="5" fill="#f5a623" fill-opacity="0.2" stroke="#f5a623" stroke-width="1"/>
  <text x="290" y="93" text-anchor="middle" font-size="15" fill="#d4861a">rating=1.0 (не зафикс.!)</text>

  <!-- Шаг 2: T2 SELECT -->
  <rect x="405" y="128" width="155" height="30" rx="5" fill="#8e44ad" fill-opacity="0.15" stroke="#8e44ad" stroke-width="1"/>
  <text x="482" y="148" text-anchor="middle" font-size="15" fill="#6c3483">SELECT rating</text>
  <line x1="405" y1="143" x2="365" y2="143" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="143" x2="250" y2="143" stroke="#8e44ad" stroke-width="1.5"/>

  <!-- Грязное чтение -->
  <rect x="215" y="128" width="150" height="30" rx="5" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="290" y="143" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">видит 1.0 ← ГРЯЗНОЕ!</text>

  <!-- Шаг 3: T1 ROLLBACK -->
  <rect x="20" y="178" width="155" height="30" rx="5" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="97" y="198" text-anchor="middle" font-size="15" fill="#c0392b">ROLLBACK</text>
  <line x1="175" y1="193" x2="215" y2="193" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="215" y="178" width="150" height="30" rx="5" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="1"/>
  <text x="290" y="193" text-anchor="middle" font-size="15" fill="#1e8449">rating вернулся к 4.0</text>

  <!-- Итог -->
  <rect x="20" y="235" width="540" height="30" rx="6" fill="#e74c3c" fill-opacity="0.1" stroke="#e74c3c" stroke-width="1"/>
  <text x="290" y="255" text-anchor="middle" font-size="16" fill="#c0392b">💥 Т2 приняла решение на основе данных, которых никогда не существовало!</text>

  <!-- Метка В PG невозможно -->
  <rect x="415" y="228" width="150" height="22" rx="5" fill="#27ae60"/>
  <text x="490" y="243" text-anchor="middle" font-size="16" font-weight="bold" fill="white">В PostgreSQL: невозможно</text>
</svg>
